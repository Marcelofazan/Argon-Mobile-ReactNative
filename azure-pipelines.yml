trigger:
  - main

pool:
  vmImage: 'macOS-latest'

variables:
  node_version: '18.x'
  projectFolder: 'argon-react-native' 

steps:
  # 1. Instalar Node.js
  - task: NodeTool@0
    inputs:
      versionSpec: '$(node_version)'
    displayName: 'Instalar Node.js'

 # 2. Instalar dependências e Gerar a pasta Android do Expo (Otimizado)
  - script: |
      export CI=true
      echo "=== Iniciando instalação com tratamento de concorrência ==="
      npm install --legacy-peer-deps --no-audit --no-fund
      
      echo "=== Gerando código nativo com Expo Prebuild ==="
      npx expo prebuild --platform android --no-interactive
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)'
    displayName: 'Instalar dependências e Pré-configurar Android (Expo)'

  # 3. Executar testes com npx
  - script: npx jest --passWithNoTests
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)'
    displayName: 'Executar testes (npx)'

  # 4. Compilar APK (Agora a pasta /android existirá graças ao prebuild)
  - script: |
      chmod +x gradlew
      ./gradlew assembleRelease
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)/android'
    displayName: 'Compilar APK (Release)'

  # 5. Publicar o arquivo APK gerado como artefato
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(Build.SourcesDirectory)/$(projectFolder)/android/app/build/outputs/apk/release/'
      artifactName: 'android-apk-release'
    displayName: 'Publicar Artefato APK'

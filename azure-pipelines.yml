trigger:
  - main

pool:
  vmImage: 'macOS-latest'

variables:
  node_version: '18.x'
  projectFolder: 'argon-react-native' 

steps:
  # 1. Configurar explicitamente a versão do Java (JDK 17) exigida pelo Gradle 7.5.1
  - task: JavaToolInstaller@0
    inputs:
      versionSpec: '17'
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'
    displayName: 'Configurar Java JDK 17 para Gradle'

  # 2. Instalar Node.js
  - task: UseNode@1
    inputs:
      version: '$(node_version)'
    displayName: 'Instalar Node.js'

  # 3. Instalar dependências JavaScript
  - script: |
      export CI=true
      echo "=== Forçando instalação limpa e monitorada ==="
      npm install --legacy-peer-deps --no-audit --no-fund --loglevel info --prefer-offline
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)'
    displayName: 'Instalar dependências (npm install)'

  # 4. Gerar pasta nativa /android isoladamente
  - script: |
      export CI=true
      echo "=== Injetando a configuração do pacote Android no app.json ==="
      jq '.expo.android.package = "com.argon.app"' app.json > tmp.json && mv tmp.json app.json
      
      echo "=== Executando o Expo Prebuild sem reinstalar dependências conflitantes ==="
      npx expo prebuild --platform android --no-install
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)'
    displayName: 'Pré-configurar Android (Expo Prebuild)'
    
  # 5. Executar testes com npx
  - script: npx jest --passWithNoTests
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)'
    displayName: 'Executar testes (npx)'

  # 6. Compilar APK (Agora garantido com o ambiente correto da JDK 17)
  - script: |
      chmod +x gradlew
      ./gradlew assembleRelease
    workingDirectory: '$(Build.SourcesDirectory)/$(projectFolder)/android'
    displayName: 'Compilar APK (Release)'

  # 7. Publicar o arquivo APK gerado como artefato
  - task: PublishPipelineArtifact@1
    inputs:
      targetPath: '$(Build.SourcesDirectory)/$(projectFolder)/android/app/build/outputs/apk/release/'
      artifactName: 'android-apk-release'
    displayName: 'Publicar Artefato APK'
